<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KBCA Muhurat QR Verification</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #071018;
        --panel: rgba(7, 16, 24, 0.92);
        --border: rgba(255, 215, 130, 0.25);
        --gold: #f2c94c;
        --text: #f7f3e8;
        --muted: #9ba9b4;
        --danger: #ff6b6b;
        --success: #4dd38b;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        background: radial-gradient(circle at top, #163345 0%, var(--bg) 55%, #02060a 100%);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .card {
        width: min(960px, 100%);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 24px;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
      }

      h1 { margin: 0 0 10px; font-size: 2rem; }
      p { color: var(--muted); line-height: 1.5; }

      .layout {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 24px;
        margin-top: 20px;
      }

      .panel {
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 18px;
        background: rgba(255, 255, 255, 0.03);
      }

      #reader { min-height: 320px; border-radius: 16px; overflow: hidden; }
      #reader video { width: 100%; border-radius: 16px; }

      .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
      button, input {
        font: inherit;
        border-radius: 999px;
        border: 1px solid var(--border);
        padding: 10px 14px;
      }
      button {
        background: var(--gold);
        color: #0b1117;
        cursor: pointer;
        font-weight: 700;
      }
      button.secondary {
        background: transparent;
        color: var(--text);
      }
      button:disabled { opacity: 0.65; cursor: not-allowed; }
      input {
        background: rgba(255,255,255,0.05);
        color: var(--text);
        width: 100%;
      }

      .status {
        margin-top: 16px;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid transparent;
        min-height: 48px;
      }
      .status.error { background: rgba(255, 107, 107, 0.12); border-color: rgba(255, 107, 107, 0.3); color: #ffd7d7; }
      .status.success { background: rgba(77, 211, 139, 0.12); border-color: rgba(77, 211, 139, 0.3); color: #d7ffe9; }
      .status.info { background: rgba(242, 201, 76, 0.12); border-color: rgba(242, 201, 76, 0.3); color: #fff2c2; }

      .details { margin-top: 14px; display: grid; gap: 8px; }
      .details div {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid rgba(255,255,255,0.08);
        padding-bottom: 8px;
      }
      .value { text-align: right; color: #fff; }
      .muted { color: var(--muted); }

      @media (max-width: 800px) {
        .layout { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Muhurat QR Verification</h1>
      <p>Scan a registration QR code or paste the Muhurat code below to verify the registration and approve the entry.</p>

      <div class="layout">
        <section class="panel">
          <div id="reader"></div>
          <div class="actions">
            <button id="startScan" type="button">Start camera scan</button>
            <button id="stopScan" class="secondary" type="button">Stop camera</button>
          </div>
        </section>

        <section class="panel">
          <label class="muted" for="manualCode">Muhurat code</label>
          <input id="manualCode" placeholder="Paste QR value here" />
          <div class="actions">
            <button id="verifyButton" type="button">Verify code</button>
            <button id="approveButton" class="secondary" type="button" disabled>Approve entry</button>
          </div>

          <div id="status" class="status info">Waiting for a QR code or manual value.</div>
          <div id="details" class="details"></div>
        </section>
      </div>
    </main>

    <script type="module">
      import jsQR from 'jsqr';

      const apiBase = (() => {
        const fromQuery = new URLSearchParams(window.location.search).get('api');
        if (fromQuery) return fromQuery.replace(/\/$/, '');
        
        const host = window.location.hostname;
        if (host === 'localhost' || host === '127.0.0.1') {
          return 'http://127.0.0.1:8000';
        }
        
        // If testing on a local network IP, point to the backend port
        if (host.startsWith('192.168.') || host.startsWith('10.') || host.startsWith('172.')) {
          return `http://${host}:8000`;
        }
        
        return 'https://kbca-backend.onrender.com';
      })();

      const statusEl = document.getElementById('status');
      const detailsEl = document.getElementById('details');
      const manualCodeInput = document.getElementById('manualCode');
      const verifyButton = document.getElementById('verifyButton');
      const approveButton = document.getElementById('approveButton');
      const startScanButton = document.getElementById('startScan');
      const stopScanButton = document.getElementById('stopScan');
      let scanner = null;
      let isScanning = false;
      let currentCode = '';
      let currentResult = null;

      const setStatus = (message, type = 'info') => {
        statusEl.className = `status ${type}`;
        statusEl.textContent = message;
      };

      const renderDetails = (user) => {
        if (!user) {
          detailsEl.innerHTML = '';
          return;
        }

        detailsEl.innerHTML = `
          <div><span class="muted">Name</span><span class="value">${user.full_name || '—'}</span></div>
          <div><span class="muted">Email</span><span class="value">${user.email || '—'}</span></div>
          <div><span class="muted">Phone</span><span class="value">${user.phone || '—'}</span></div>
          <div><span class="muted">Registration</span><span class="value">${user.registration_status ? 'Confirmed' : 'Pending'}</span></div>
          <div><span class="muted">Adults</span><span class="value">${user.registered_adults}</span></div>
          <div><span class="muted">Children (6-12)</span><span class="value">${user.registered_children_6_12}</span></div>
          <div><span class="muted">Children (under 6)</span><span class="value">${user.registered_children_under_6}</span></div>
          <div><span class="muted">Amount paid</span><span class="value">₹${user.amount_paid}</span></div>
          <div><span class="muted">Muhurat entry</span><span class="value">${user.muhurat_entry ? 'Approved' : 'Pending'}</span></div>
        `;
      };

      async function requestVerification(code) {
        verifyButton.disabled = true;
        approveButton.disabled = true;
        setStatus('Verifying QR value…', 'info');

        try {
          const response = await fetch(`${apiBase}/verify-muhurat-code`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ muhurat_code: code })
          });

          const contentType = response.headers.get("content-type");
          let data;
          if (contentType && contentType.includes("application/json")) {
            data = await response.json();
          } else {
            throw new Error(`Server returned non-JSON response (${response.status}). Is the API URL correct?`);
          }

          if (!response.ok) {
            let errorMsg = data.detail || 'Verification failed';
            if (Array.isArray(errorMsg)) {
              errorMsg = errorMsg.map(e => e.msg || e.type).join(', ');
            } else if (typeof errorMsg === 'object') {
              errorMsg = JSON.stringify(errorMsg);
            }
            throw new Error(errorMsg);
          }

          currentCode = code;
          currentResult = data;
          renderDetails(data);
          setStatus(`Registration found for ${data.full_name || data.email || 'the attendee'}.`, 'success');
          approveButton.disabled = false;
        } catch (error) {
          currentResult = null;
          renderDetails(null);
          setStatus(`Debug: ${error.name}: ${error.message}. apiBase: ${apiBase}`, 'error');
          console.error(error);
        } finally {
          verifyButton.disabled = false;
        }
      }

      async function approveCurrentCode() {
        if (!currentCode) {
          setStatus('Verify a code first before approving.', 'error');
          return;
        }

        approveButton.disabled = true;
        setStatus('Approving entry…', 'info');

        try {
          const response = await fetch(`${apiBase}/approve-muhurat-entry`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ muhurat_code: currentCode })
          });

          const contentType = response.headers.get("content-type");
          let data;
          if (contentType && contentType.includes("application/json")) {
            data = await response.json();
          } else {
            throw new Error(`Server returned non-JSON response (${response.status}). Is the API URL correct?`);
          }

          if (!response.ok) {
            let errorMsg = data.detail || 'Approval failed';
            if (Array.isArray(errorMsg)) {
              errorMsg = errorMsg.map(e => e.msg || e.type).join(', ');
            } else if (typeof errorMsg === 'object') {
              errorMsg = JSON.stringify(errorMsg);
            }
            throw new Error(errorMsg);
          }

          currentResult = data;
          renderDetails(data);
          setStatus('Muhurat entry approved successfully.', 'success');
        } catch (error) {
          setStatus(error.message || 'Approval failed.', 'error');
        } finally {
          approveButton.disabled = false;
        }
      }

      verifyButton.addEventListener('click', () => {
        const code = manualCodeInput.value.trim();
        if (!code) {
          setStatus('Please enter a Muhurat code first.', 'error');
          return;
        }
        requestVerification(code);
      });

      approveButton.addEventListener('click', approveCurrentCode);

      async function startScanner() {
        if (!navigator.mediaDevices?.getUserMedia) {
          setStatus('This browser does not support camera scanning.', 'error');
          return;
        }

        if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
          setStatus('Camera scanning requires HTTPS or localhost.', 'error');
          return;
        }

        try {
          startScanButton.disabled = true;
          setStatus('Requesting camera access…', 'info');

          const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
          const video = document.createElement('video');
          video.srcObject = stream;
          video.setAttribute('playsinline', 'true');
          video.muted = true;
          const reader = document.getElementById('reader');
          reader.innerHTML = '';
          reader.appendChild(video);
          await video.play();

          const canvas = document.createElement('canvas');
          const context = canvas.getContext('2d');
          let stopped = false;

          const tick = () => {
            if (stopped) return;
            if (video.readyState >= 2) {
              canvas.width = video.videoWidth;
              canvas.height = video.videoHeight;
              context.drawImage(video, 0, 0, canvas.width, canvas.height);
              const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
              const code = jsQR(imageData.data, canvas.width, canvas.height);
              if (code) {
                stopped = true;
                stream.getTracks().forEach((track) => track.stop());
                reader.innerHTML = '';
                manualCodeInput.value = code.data;
                requestVerification(code.data);
                setStatus('QR code detected.', 'success');
                return;
              }
            }
            requestAnimationFrame(tick);
          };

          isScanning = true;
          setStatus('Camera ready. Point it at the QR code.', 'success');
          tick();
        } catch (error) {
          isScanning = false;
          setStatus(error?.message || 'Unable to start the camera scanner.', 'error');
        } finally {
          startScanButton.disabled = false;
        }
      }

      async function stopScanner() {
        if (!isScanning) {
          return;
        }

        const reader = document.getElementById('reader');
        reader.innerHTML = '';
        isScanning = false;
        setStatus('Camera stopped.', 'info');
      }

      startScanButton.addEventListener('click', startScanner);
      stopScanButton.addEventListener('click', stopScanner);
    </script>
  </body>
</html>
